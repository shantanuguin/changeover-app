<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
    <link rel="manifest" href="/manifest.json">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test FCM Notification</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .btn-animate {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-animate:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8 max-w-md w-full text-center">
        <div
            class="w-20 h-20 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm">
            <i data-lucide="bell-ring" class="w-10 h-10"></i>
        </div>

        <h1 class="text-2xl font-heading font-bold text-slate-900 mb-2">FCM Test Portal</h1>
        <p class="text-slate-500 text-sm mb-8">This tool triggers a backend notification directly to test if your device
            receives Push Notifications in the background.</p>

        <button id="testBtn" onclick="testNotification()"
            class="btn-animate w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold py-4 px-6 rounded-2xl shadow-lg shadow-slate-900/20 flex items-center justify-center gap-3 text-lg">
            <i data-lucide="send" class="w-5 h-5"></i>
            Send Test Notification
        </button>
        <p class="text-xs text-slate-400 mt-4">Make sure you allow notifications when prompted, and <strong>minimize
                this window</strong> right after clicking "Send" to test background delivery.</p>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/firebase-config.js"></script>
    <script src="../assets/js/fcm-notifications.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Init Firebase
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            window.db = firebase.firestore();

            // Init FCM token generation and permission
            await initFCM();
            lucide.createIcons();
        });

        // Minimal fallback for supervisor lookup on test page
        const RAW_LINE_SCHEDULES = {
            'S-13': { supervisor: 'SUMON' },
            'S-01': { supervisor: 'WASANA-1' },
            'S-05': { supervisor: 'OMAR FARUK' }
        };

        async function testNotification() {
            const btn = document.getElementById('testBtn');
            const originalText = btn.innerHTML;

            try {
                btn.disabled = true;
                btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Sending...`;
                lucide.createIcons();

                // Realistic mock simulating a real changeover start notification
                const dummyQcoId = `S-13-NF0A-TEST-${Math.floor(Math.random() * 1000)}`;
                const qcoData = {
                    lineNumber: 'S-13',
                    qcoNumber: dummyQcoId,
                    operationsList: ['Prepare Machines', 'Thread Change', 'Sample Approval']
                };
                const firstOp = qcoData.operationsList[0];

                // isTest=true adds [TEST] prefix to the notification title
                await sendStartNotification(dummyQcoId, firstOp, qcoData, true);

                Swal.fire({
                    icon: 'success',
                    title: 'Sent!',
                    html: `<div style="text-align:left;font-size:13px;line-height:1.8">
                        <b>Title:</b> 🚨🚨[TEST] Changeover started in SUMON Line S-13<br>
                        <b>Body:</b> and the first operation is "${firstOp}"<br><br>
                        <span style="color:#94a3b8">Minimise the window to test background push delivery.</span>
                    </div>`,
                    confirmButtonColor: '#0f172a'
                });

            } catch (error) {
                console.error('Test notification failed:', error);
                Swal.fire('Error', 'Failed to send notification request.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        }
    </script>
</body>

</html>
